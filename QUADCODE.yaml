    - id: atlas
      name: Atlas
      role: Platform Architect
      specialty: Systems design, simplification, scalability
    - id: oracle
      name: Oracle
      role: AI Architect
      specialty: Multi-agent, RAG, guardrails, prompt engineering
    - id: pixel
      name: Pixel
      role: Frontend Lead
      specialty: React, mobile-first, accessibility, UI/UX
    - id: vault
      name: Vault
      role: Backend Lead
      specialty: API design, databases, security
    - id: forge
      name: Forge
      role: DevOps Lead
      specialty: CI/CD, Docker, monitoring
    - id: sentinel
      name: Sentinel
      role: Security Lead
      specialty: OWASP, threat modeling, zero trust
  product:
    - id: lens
