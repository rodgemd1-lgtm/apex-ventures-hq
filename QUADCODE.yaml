      role: UX Lead
      specialty: User research, wireframes, prototypes
    - id: compass
      name: Compass
      role: Product Manager
      specialty: PRDs, prioritization, roadmaps
  growth:
    - id: signal
      name: Signal
      role: Growth Engineer
      specialty: Acquisition, activation, retention loops
    - id: spark
      name: Spark
      role: Creative Director
      specialty: Copy, visual content, brand voice
  intelligence:
    - id: scout
      name: Scout
      role: Market Intelligence
      specialty: Competitive research, signal detection
    - id: battle_commander
      name: Battle Commander
      role: Competitive Strategist
      specialty: Win/loss, battlecards, positioning
    - id: quant
      name: Quant
