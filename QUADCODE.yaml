protocols:
  directory: docs/protocols/
  files:
    - "000-INIT.md"
    - "010-ARCHITECTURE.md"
    - "020-DATABASE.md"
    - "030-AUTH.md"
    - "040-API.md"
    - "050-FRONTEND.md"
    - "060-AI-AGENTS.md"
    - "070-AUTOMATION.md"
    - "080-TESTING.md"
    - "090-DEPLOY.md"
    - "100-MONITORING.md"
    - "110-SECURITY.md"
    - "999-INNOVATION.md"

quality_gates:
  test_coverage_target: 80
  lighthouse_target: 90
  core_web_vitals:
    lcp_ms: 2500
    fid_ms: 100
    cls: 0.1
  api_performance:
    read_ms: 200
    write_ms: 500
  accessibility: "WCAG 2.1 AA"

api_registry:
  doc: docs/api-registry.md
  services:
    - name: Anthropic
      env_var: ANTHROPIC_API_KEY
    - name: OpenAI
      env_var: OPENAI_API_KEY
    - name: Supabase
      env_vars: [SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY]
    - name: Stripe
      env_vars: [STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET]
    - name: Railway
      env_var: RAILWAY_TOKEN
    - name: Vercel
      env_var: VERCEL_TOKEN
    - name: Serper
      env_var: SERPER_API_KEY
    - name: CrewAI
      env_vars: [CREWAI_API_KEY, CREWAI_BASE_URL]
