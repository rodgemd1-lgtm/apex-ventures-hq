      status: planned
    - name: "@apex/ui"
      path: shared/packages/ui/
      status: planned
    - name: "@apex/api-client"
      path: shared/packages/api-client/
      status: planned
    - name: "@apex/database"
      path: shared/packages/database/
      status: planned
    - name: "@apex/ai"
      path: shared/packages/ai/
      status: planned
    - name: "@apex/config"
      path: shared/packages/config/
      status: planned

agents:
